# Single-container deployment.
# MongoDB runs inside the same container as Next.js (see Dockerfile + docker-entrypoint.sh).
# Only secrets that cannot be baked into the image are kept here.

services:
  next:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # MONGODB_URI is already baked into the image as a default.
      # Set it here ONLY if you want to point to an external MongoDB.
      # MONGODB_URI: mongodb://127.0.0.1:27017/
      JWT_SECRET: ${JWT_SECRET}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
